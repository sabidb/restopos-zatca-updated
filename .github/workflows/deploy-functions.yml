name: Deploy Firebase Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write service account key
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/key.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        # Secrets are read from Google Secret Manager at runtime (bound via
        # defineSecret in functions/index.js). Set them once with:
        #   firebase functions:secrets:set QZ_PRIVATE_KEY
        #   firebase functions:secrets:set AI_API_KEY   # optional; else config/ai is used
        run: npx firebase-tools@13 deploy --only functions:verifyLogin,functions:setClientCredentials,functions:aiChat,functions:qzSign,functions:requestPasswordReset,functions:resetPasswordWithOtp --project restopos-db
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/key.json
